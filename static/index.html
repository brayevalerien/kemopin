<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kemopin</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="board-ui">
        <div id="toolbar">
            <span id="save-indicator"></span>
            <div id="save-area">
                <button id="save-button">Save</button>
                <div id="board-size"><div id="board-size-fill"></div></div>
            </div>
        </div>
        <div id="canvas-container"></div>
        <div id="shortcuts-hint">H for shortcuts</div>
        <div id="version-indicator"></div>
        <div id="shortcuts-overlay">
            <div id="shortcuts-panel"></div>
        </div>
    </div>

    <div id="create-form" style="display: none;">
        <div class="form-box">
            <h1>Board not found</h1>
            <p>Create <strong id="form-slug"></strong>?</p>
            <input type="password" id="password-input" placeholder="Admin password" autocomplete="off">
            <button id="create-button">Create</button>
            <p id="form-error"></p>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://unpkg.com/konva@9.3.22/konva.min.js" integrity="sha384-G8/+hM8690rXL8qUdTKaK/yvDDdvXHBl0BoqGPJG29LsF5DjJsefNwngcU+SEf0p" crossorigin="anonymous"></script>
    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
