<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 — Kemopin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #272822;
            color: #f8f8f2;
            font-family: system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .layout {
            display: flex;
            align-items: center;
            gap: 3rem;
        }

        .code {
            font-size: 8rem;
            font-weight: 700;
            color: #ae81ff;
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .divider {
            width: 1px;
            height: 8rem;
            background: #75715e;
            opacity: 0.4;
        }

        .right {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .label {
            font-size: 0.75rem;
            color: #75715e;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .msg {
            font-size: 0.9rem;
            color: #f8f8f2;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="code">404</div>
        <div class="divider"></div>
        <div class="right">
            <span class="label">kemopin</span>
            <p class="msg">Page not found.</p>
        </div>
    </div>
</body>
</html>
